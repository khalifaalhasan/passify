
<style>
#erd { padding: 8px 0; }
#erd svg { max-width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryBorderColor: dark ? '#534AB7' : '#AFA9EC',
    primaryTextColor: dark ? '#CECBF6' : '#26215C',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    secondaryBorderColor: dark ? '#0F6E56' : '#5DCAA5',
    secondaryTextColor: dark ? '#9FE1CB' : '#04342C',
    tertiaryColor: dark ? '#444441' : '#F1EFE8',
    tertiaryBorderColor: dark ? '#888780' : '#B4B2A9',
    tertiaryTextColor: dark ? '#D3D1C7' : '#2C2C2A',
  },
});
const diagram = `erDiagram
  USERS {
    uuid id PK
    string email UK
    string master_password_hash
    string password_hint
    string encryption_key_salt
    string two_factor_secret
    boolean two_factor_enabled
    timestamp last_login_at
    timestamp created_at
    timestamp updated_at
  }

  VAULTS {
    uuid id PK
    uuid user_id FK
    string name
    string description
    timestamp created_at
    timestamp updated_at
  }

  VAULT_ITEMS {
    uuid id PK
    uuid vault_id FK
    string type
    string name
    text encrypted_data
    boolean is_favorite
    timestamp last_used_at
    timestamp created_at
    timestamp updated_at
  }

  FOLDERS {
    uuid id PK
    uuid vault_id FK
    string name
    timestamp created_at
  }

  VAULT_ITEM_FOLDERS {
    uuid item_id FK
    uuid folder_id FK
  }

  TAGS {
    uuid id PK
    uuid vault_id FK
    string name
    string color
  }

  VAULT_ITEM_TAGS {
    uuid item_id FK
    uuid tag_id FK
  }

  ATTACHMENTS {
    uuid id PK
    uuid item_id FK
    string filename
    string storage_path
    integer file_size
    string mime_type
    timestamp created_at
  }

  SESSIONS {
    uuid id PK
    uuid user_id FK
    string token_hash
    string device_name
    string device_type
    string ip_address
    timestamp expires_at
    timestamp created_at
  }

  AUDIT_LOGS {
    uuid id PK
    uuid user_id FK
    uuid item_id FK
    string action
    string ip_address
    string user_agent
    timestamp created_at
  }

  USERS ||--o{ VAULTS : owns
  USERS ||--o{ SESSIONS : has
  USERS ||--o{ AUDIT_LOGS : generates
  VAULTS ||--o{ VAULT_ITEMS : contains
  VAULTS ||--o{ FOLDERS : has
  VAULTS ||--o{ TAGS : defines
  VAULT_ITEMS ||--o{ VAULT_ITEM_FOLDERS : "grouped in"
  FOLDERS ||--o{ VAULT_ITEM_FOLDERS : groups
  VAULT_ITEMS ||--o{ VAULT_ITEM_TAGS : tagged
  TAGS ||--o{ VAULT_ITEM_TAGS : labels
  VAULT_ITEMS ||--o{ ATTACHMENTS : has
  VAULT_ITEMS ||--o{ AUDIT_LOGS : tracked
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
